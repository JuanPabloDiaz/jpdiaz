name: Deployment Preview

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: 'preview-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

env:
  BUILD_PATH: '.'

jobs:
  build:
    name: Build Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.BUILD_PATH }}
      - name: Build with Astro
        env:
          ASTRO_SITE: 'https://jpdiaz.dev'
          ASTRO_BASE: '/'
        run: pnpm astro build
        working-directory: ${{ env.BUILD_PATH }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-dist-${{ github.event.pull_request.number }}
          path: ${{ env.BUILD_PATH }}/dist

  notify:
    needs: build
    runs-on: ubuntu-latest
    name: Notify Preview Build
    steps:
      - name: Create PR Comment
        if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number('${{ github.event.pull_request.number }}');
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `## ✅ Preview Build Ready

            This PR build was generated successfully and uploaded as a workflow artifact.
            Download it from this run:

            ${runUrl}

            _No GitHub Pages deployment is performed from pull_request workflows (to avoid affecting production)._`;

            await github.rest.issues.createComment({
             owner: context.repo.owner,
             repo: context.repo.repo,
             issue_number: prNumber,
             body,
            });
