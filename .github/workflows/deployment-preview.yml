name: Deployment Preview

on:
  pull_request:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: 'preview-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

env:
  BUILD_PATH: '.'

jobs:
  build:
    name: Build Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ env.BUILD_PATH }}
      - name: Build with Astro
        env:
          ASTRO_SITE: 'https://juanpablodiaz.github.io'
          ASTRO_BASE: '/jpdiaz/pr-preview-${{ github.event.pull_request.number }}'
        run: pnpm astro build
        working-directory: ${{ env.BUILD_PATH }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy Preview
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Create PR Comment
        if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const previewUrl = '${{ steps.deployment.outputs.page_url }}';
            const prNumber = Number('${{ github.event.pull_request.number }}');

            const body = `## 🚀 Preview Deployment Ready!

            **Preview URL:** ${previewUrl}

            *This preview will be automatically updated when new commits are pushed to this PR.*`;

            await github.rest.issues.createComment({
             owner: context.repo.owner,
             repo: context.repo.repo,
             issue_number: prNumber,
             body,
            });
